                <option value="cielab76" selected>2. CIE76 (Pro Visual Perception)</option>
                <option value="euclidean">3. Euclidean (True RGB)</option>
                <option value="weighted_rgb">4. Weighted RGB (Classic Luminescence)</option>
                <option value="luma">5. Luma (YIQ Contrast)</option>
                <option value="hsv">6. HSV Space (Prioritizes Hue)</option>
                <option value="hsl">7. HSL Space (Prioritizes Lightness/Hue)</option>
                <option value="cmyk">8. CMYK Space (Physical Dye Matching)</option>
                <option value="manhattan">9. Manhattan (Taxicab RGB)</option>
                <option value="chebyshev">10. Chebyshev (Max RGB Difference)</option>
            </select>
        </div>
        <div class="control-group" style="flex: 0.5;">
            <label for="gridWidth">Width</label>
            <input type="number" id="gridWidth" value="30" min="5" max="200">

        /* --- ADVANCED COLOR MATH HELPERS --- */
        
        function hexToRgb(hex) {
            let r = parseInt(hex.substring(1, 3), 16);
            let g = parseInt(hex.substring(3, 5), 16);
            let b = parseInt(hex.substring(5, 7), 16);
            return { r, g, b };
        }

        function rgbToXyz(r, g, b) {
            let _r = (r / 255);
            let _g = (g / 255);
            let _b = (b / 255);

            _r = _r > 0.04045 ? Math.pow((_r + 0.055) / 1.055, 2.4) : _r / 12.92;
            _g = _g > 0.04045 ? Math.pow((_g + 0.055) / 1.055, 2.4) : _g / 12.92;
            _b = _b > 0.04045 ? Math.pow((_b + 0.055) / 1.055, 2.4) : _b / 12.92;

            _r = _r * 100; _g = _g * 100; _b = _b * 100;

            return {
                x: _r * 0.4124 + _g * 0.3576 + _b * 0.1805,
                y: _r * 0.2126 + _g * 0.7152 + _b * 0.0722,
                z: _r * 0.0193 + _g * 0.1192 + _b * 0.9505
            };
        }

        function xyzToLab(x, y, z) {
            // Observer= 2°, Illuminant= D65
            let _x = x / 95.047;
            let _y = y / 100.000;
            let _z = z / 108.883;

            _x = _x > 0.008856 ? Math.pow(_x, 1/3) : (7.787 * _x) + (16 / 116);
            _y = _y > 0.008856 ? Math.pow(_y, 1/3) : (7.787 * _y) + (16 / 116);
            _z = _z > 0.008856 ? Math.pow(_z, 1/3) : (7.787 * _z) + (16 / 116);

            return {
                l: (116 * _y) - 16,
                a: 500 * (_x - _y),
                b: 200 * (_y - _z)
            };
        }

        function rgbToLab(r, g, b) {
            const xyz = rgbToXyz(r, g, b);
            return xyzToLab(xyz.x, xyz.y, xyz.z);
        }

        function rgbToHsv(r, g, b) {
            let rabs = r/255, gabs = g/255, babs = b/255;
            let v = Math.max(rabs, gabs, babs), diff = v - Math.min(rabs, gabs, babs);
            let diffc = c => (v - c) / 6 / diff + 1 / 2;
            let h = 0, s = 0;
            if (diff !== 0) {
                s = diff / v;
                let rr = diffc(rabs), gg = diffc(gabs), bb = diffc(babs);
                if (rabs === v) h = bb - gg;
                else if (gabs === v) h = (1 / 3) + rr - bb;
                else if (babs === v) h = (2 / 3) + gg - rr;
                if (h < 0) h += 1;
                else if (h > 1) h -= 1;
            }
            return { h: Math.round(h * 360), s: s * 100, v: v * 100 };
        }

        function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) { h = s = 0; }
            else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return { h: h * 360, s: s * 100, l: l * 100 };
        }

        function rgbToCmyk(r, g, b) {
            let c = 1 - (r / 255);
            let m = 1 - (g / 255);
            let y = 1 - (b / 255);
            let k = Math.min(c, Math.min(m, y));
            if (k === 1) return { c: 0, m: 0, y: 0, k: 1 };
            return {
                c: (c - k) / (1 - k),
                m: (m - k) / (1 - k),
                y: (y - k) / (1 - k),
                k: k
            };
        }

        const paletteData = beadPalette.map(color => {
            const rgb = hexToRgb(color.hex);
            return {
                ...color,
                rgb: rgb,
                lab: rgbToLab(rgb.r, rgb.g, rgb.b),
                hsv: rgbToHsv(rgb.r, rgb.g, rgb.b),
                hsl: rgbToHsl(rgb.r, rgb.g, rgb.b),
                cmyk: rgbToCmyk(rgb.r, rgb.g, rgb.b)
            };
        });

        function findClosestColor(r, g, b, algorithm) {
            let minDistance = Infinity;
            let closestColor = paletteData[0];
            
            let targetLab, targetHsv, targetHsl, targetCmyk;
            if (algorithm === 'cielab76') targetLab = rgbToLab(r, g, b);
            if (algorithm === 'hsv') targetHsv = rgbToHsv(r, g, b);
            if (algorithm === 'hsl') targetHsl = rgbToHsl(r, g, b);
            if (algorithm === 'cmyk') targetCmyk = rgbToCmyk(r, g, b);

            for (let i = 0; i < paletteData.length; i++) {
                const color = paletteData[i];
                const dR = r - color.rgb.r;
                const dG = g - color.rgb.g;
                const dB = b - color.rgb.b;
                let distance = 0;

                switch(algorithm) {
                    case 'euclidean':
                        distance = Math.sqrt((dR*dR) + (dG*dG) + (dB*dB));
                        break;
                    case 'redmean':
                        const rMean = (r + color.rgb.r) / 2;
                        const weightR = 2 + rMean / 256;
                        const weightB = 2 + (255 - rMean) / 256;
                        distance = Math.sqrt(weightR * (dR*dR) + 4.0 * (dG*dG) + weightB * (dB*dB));
                        break;
                    case 'weighted_rgb':
                        distance = Math.sqrt(0.3*(dR*dR) + 0.59*(dG*dG) + 0.11*(dB*dB));
                        break;
                    case 'luma':
                        distance = Math.sqrt(Math.pow(dR*0.299, 2) + Math.pow(dG*0.587, 2) + Math.pow(dB*0.114, 2));
                        break;
                    case 'manhattan':
                        distance = Math.abs(dR) + Math.abs(dG) + Math.abs(dB);
                        break;
                    case 'chebyshev':
                        distance = Math.max(Math.abs(dR), Math.abs(dG), Math.abs(dB));
                        break;
                    case 'cielab76':
                        const dL = targetLab.l - color.lab.l;
                        const da = targetLab.a - color.lab.a;
                        const db = targetLab.b - color.lab.b;
                        distance = Math.sqrt((dL*dL) + (da*da) + (db*db));
                        break;
                    case 'hsv':
                        const dhHSV = Math.min(Math.abs(targetHsv.h - color.hsv.h), 360 - Math.abs(targetHsv.h - color.hsv.h)) / 360;
                        const dsHSV = (targetHsv.s - color.hsv.s) / 100;
                        const dvHSV = (targetHsv.v - color.hsv.v) / 100;
                        distance = Math.sqrt((dhHSV*dhHSV*4) + (dsHSV*dsHSV) + (dvHSV*dvHSV));
                        break;
                    case 'hsl':
                        const dhHSL = Math.min(Math.abs(targetHsl.h - color.hsl.h), 360 - Math.abs(targetHsl.h - color.hsl.h)) / 360;
                        const dsHSL = (targetHsl.s - color.hsl.s) / 100;
                        const dlHSL = (targetHsl.l - color.hsl.l) / 100;
                        distance = Math.sqrt((dhHSL*dhHSL*4) + (dsHSL*dsHSL) + (dlHSL*dlHSL));
                        break;
                    case 'cmyk':
                        const dC = targetCmyk.c - color.cmyk.c;
                        const dM = targetCmyk.m - color.cmyk.m;
                        const dY = targetCmyk.y - color.cmyk.y;
                        const dK = targetCmyk.k - color.cmyk.k;
                        distance = Math.sqrt((dC*dC) + (dM*dM) + (dY*dY) + (dK*dK));
                        break;
                }

                if (distance < minDistance) {
                    minDistance = distance;
                    closestColor = color;
                }
            }
            return closestColor;
        }

        function getContrastYIQ(r, g, b) {
            const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
            return (yiq >= 128) ? '#000000' : '#FFFFFF';
        }

        const imageUpload = document.getElementById('imageUpload');
        const generateBtn = document.getElementById('generateBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const outputCanvas = document.getElementById('outputCanvas');
        const baseCanvas = document.getElementById('baseCanvas');
        const fusedCanvas = document.getElementById('fusedCanvas');
        const ctx = outputCanvas.getContext('2d');
        const baseCtx = baseCanvas.getContext('2d');
        const fusedCtx = fusedCanvas.getContext('2d');

        let croppedImageData = null;

        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = img.width;
                    tempCanvas.height = img.height;
                    const tempCtx = tempCanvas.getContext('2d');
                    tempCtx.drawImage(img, 0, 0);
                    
                    const imgData = tempCtx.getImageData(0, 0, img.width, img.height);
                    const data = imgData.data;
                    
                    let minX = 0, minY = 0, maxX = img.width - 1, maxY = img.height - 1;
                    
                    if (document.getElementById('autoCrop').checked) {
                        minX = img.width; minY = img.height; maxX = 0; maxY = 0;
                        for (let y = 0; y < img.height; y++) {
                            for (let x = 0; x < img.width; x++) {
                                const i = (y * img.width + x) * 4;
                                const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
                                
                                const isWhite = (r > 240 && g > 240 && b > 240);
                                if (a > 50 && !isWhite) {
                                    if (x < minX) minX = x;
                                    if (x > maxX) maxX = x;
                                    if (y < minY) minY = y;
                                    if (y > maxY) maxY = y;
                                }
                            }
                        }
                        if (maxX < minX || maxY < minY) {
                            minX = 0; minY = 0; maxX = img.width - 1; maxY = img.height - 1;
                        }
                    }

                    const croppedWidth = maxX - minX + 1;
                    const croppedHeight = maxY - minY + 1;

                    const cropCanvas = document.createElement('canvas');
                    cropCanvas.width = croppedWidth;
                    cropCanvas.height = croppedHeight;
                    const cropCtx = cropCanvas.getContext('2d');
                    cropCtx.drawImage(img, minX, minY, croppedWidth, croppedHeight, 0, 0, croppedWidth, croppedHeight);
                    
                    croppedImageData = cropCanvas;

                    const maxSize = 50;
                    let targetW, targetH;
                    if (croppedWidth > croppedHeight) {
                        targetW = maxSize;
                        targetH = Math.max(5, Math.round((croppedHeight / croppedWidth) * maxSize));
                    } else {
                        targetH = maxSize;
                        targetW = Math.max(5, Math.round((croppedWidth / croppedHeight) * maxSize));
                    }

                    document.getElementById('gridWidth').value = targetW;
                    document.getElementById('gridHeight').value = targetH;
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        generateBtn.addEventListener('click', () => {
            if (!croppedImageData) {
                alert("Please upload an image first.");
                return;
            }

            const gridW = parseInt(document.getElementById('gridWidth').value);
            const gridH = parseInt(document.getElementById('gridHeight').value);
            const selectedAlgo = document.getElementById('colorAlgo').value;

            const cellSize = 24; 
            const axisOffset = 30; 

            outputCanvas.width = (gridW * cellSize) + axisOffset;
            outputCanvas.height = (gridH * cellSize) + axisOffset;
            
            baseCanvas.width = (gridW * cellSize) + axisOffset;
            baseCanvas.height = (gridH * cellSize) + axisOffset;

            fusedCanvas.width = gridW * cellSize;
            fusedCanvas.height = gridH * cellSize;

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = gridW;
            tempCanvas.height = gridH;
            const tempCtx = tempCanvas.getContext('2d');
            
            tempCtx.drawImage(croppedImageData, 0, 0, gridW, gridH);
            const imgData = tempCtx.getImageData(0, 0, gridW, gridH).data;

            [ctx, baseCtx].forEach(context => {
                context.fillStyle = '#ffffff';
                context.fillRect(0, 0, outputCanvas.width, outputCanvas.height);
                context.textAlign = 'center';
                context.textBaseline = 'middle';
            });

            fusedCtx.fillStyle = '#ffffff'; 
            fusedCtx.fillRect(0, 0, fusedCanvas.width, fusedCanvas.height);

            [ctx, baseCtx].forEach(context => {
                context.fillStyle = '#333';
                context.font = '12px Arial';
                for (let x = 0; x < gridW; x++) {
                    if ((x + 1) % 5 === 0 || x === 0) {
                        context.fillText(x + 1, axisOffset + (x * cellSize) + (cellSize / 2), axisOffset / 2);
                    }
                }
                for (let y = 0; y < gridH; y++) {
                    if ((y + 1) % 5 === 0 || y === 0) {
                        context.fillText(y + 1, axisOffset / 2, axisOffset + (y * cellSize) + (cellSize / 2));
                    }
                }
            });

            // Tracking object for bead counts
            let beadCounts = {};

            for (let y = 0; y < gridH; y++) {
                for (let x = 0; x < gridW; x++) {
                    const i = (y * gridW + x) * 4;
                    const r = imgData[i];
                    const g = imgData[i + 1];
                    const b = imgData[i + 2];
                    const a = imgData[i + 3];

                    if (a < 128) {
                        [ctx, baseCtx].forEach(context => {
                            context.fillStyle = '#ffffff';
                            context.fillRect(axisOffset + x * cellSize, axisOffset + y * cellSize, cellSize, cellSize);
                            context.strokeStyle = '#eee';
                            context.strokeRect(axisOffset + x * cellSize, axisOffset + y * cellSize, cellSize, cellSize);
                        });
                        continue;
                    }

                    const matchedColor = findClosestColor(r, g, b, selectedAlgo);
                    
                    // Increment count for this bead color
                    if (!beadCounts[matchedColor.code]) {
                        beadCounts[matchedColor.code] = {
                            hex: matchedColor.hex,
                            count: 0
                        };
                    }
                    beadCounts[matchedColor.code].count++;

                    ctx.fillStyle = matchedColor.hex;
                    ctx.fillRect(axisOffset + x * cellSize, axisOffset + y * cellSize, cellSize, cellSize);
                    ctx.strokeStyle = '#aaaaaa';
                    ctx.strokeRect(axisOffset + x * cellSize, axisOffset + y * cellSize, cellSize, cellSize);

                    ctx.fillStyle = getContrastYIQ(matchedColor.rgb.r, matchedColor.rgb.g, matchedColor.rgb.b);
                    ctx.font = '10px Arial';
                    ctx.fillText(
                        matchedColor.code, 
                        axisOffset + (x * cellSize) + (cellSize / 2), 
                        axisOffset + (y * cellSize) + (cellSize / 2)
                    );

                    baseCtx.fillStyle = matchedColor.hex;
                    baseCtx.fillRect(axisOffset + x * cellSize, axisOffset + y * cellSize, cellSize, cellSize);
                    baseCtx.strokeStyle = '#aaaaaa';
                    baseCtx.strokeRect(axisOffset + x * cellSize, axisOffset + y * cellSize, cellSize, cellSize);

                    const centerX = (x * cellSize) + (cellSize / 2);
                    const centerY = (y * cellSize) + (cellSize / 2);
                    
                    const gradient = fusedCtx.createRadialGradient(
                        centerX - (cellSize/6), centerY - (cellSize/6), cellSize/10,
                        centerX, centerY, cellSize/1.5
                    );
                    
                    gradient.addColorStop(0, adjustColorBrightness(matchedColor.hex, 30));
                    gradient.addColorStop(0.7, matchedColor.hex);
                    gradient.addColorStop(1, adjustColorBrightness(matchedColor.hex, -20));

                    fusedCtx.beginPath();
                    fusedCtx.arc(centerX, centerY, (cellSize / 2) * 1.15, 0, 2 * Math.PI, false);
                    fusedCtx.fillStyle = gradient;
                    fusedCtx.fill();
                }
            }

            // Generate Table 
            generateBeadTable(beadCounts);
            
            downloadBtn.disabled = false;
        });

        function generateBeadTable(counts) {
            const container = document.getElementById('beadTableContainer');
            const content = document.getElementById('beadTableContent');
            
            // Convert to array and sort by count descending
            const sortedCounts = Object.entries(counts).sort((a, b) => b[1].count - a[1].count);
            
            if (sortedCounts.length === 0) {
                container.style.display = 'none';
                return;
            }

            let tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Color Code</th>
                            <th>Color Preview</th>
                            <th>Hex Value</th>
                            <th>Quantity Required</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            sortedCounts.forEach(([code, data]) => {
                tableHTML += `
                    <tr>
                        <td><strong>${code}</strong></td>
                        <td><span class="color-swatch" style="background-color: ${data.hex}"></span></td>
                        <td>${data.hex}</td>
                        <td>${data.count}</td>
                    </tr>
                `;
            });
            
            tableHTML += `
                    </tbody>
                </table>
            `;
            
            content.innerHTML = tableHTML;
            container.style.display = 'flex';
        }

        function adjustColorBrightness(hex, percent) {
            let r = parseInt(hex.substring(1, 3), 16);
            let g = parseInt(hex.substring(3, 5), 16);
            let b = parseInt(hex.substring(5, 7), 16);

            r = parseInt(r * (100 + percent) / 100);
            g = parseInt(g * (100 + percent) / 100);
            b = parseInt(b * (100 + percent) / 100);

            r = (r < 255) ? r : 255;
            g = (g < 255) ? g : 255;
            b = (b < 255) ? b : 255;

            const rr = ((r.toString(16).length === 1) ? "0" + r.toString(16) : r.toString(16));
            const gg = ((g.toString(16).length === 1) ? "0" + g.toString(16) : g.toString(16));
            const bb = ((b.toString(16).length === 1) ? "0" + b.toString(16) : b.toString(16));

            return "#" + rr + gg + bb;
        }

        downloadBtn.addEventListener('click', () => {
            const dlType = document.getElementById('dlType').value;
            let targetCanvas;
            
            if (dlType === 'blueprint') targetCanvas = outputCanvas;
            else if (dlType === 'base') targetCanvas = baseCanvas;
            else if (dlType === 'fused') targetCanvas = fusedCanvas;

            const link = document.createElement('a');
            link.download = `perler-${dlType}.png`;
            link.href = targetCanvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
